name: Build and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@main
        with:
          submodules: true
      
      - name: Install FLINT (macOS)
        if: runner.os == 'macOS'
        run: brew install flint

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:

          CIBW_PRERELEASE_PYTHONS: True
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_FREE_THREADED_SUPPORT: True

          MACOSX_DEPLOYMENT_TARGET: "15.0"

          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ARCHS_LINUX: "x86_64"

          CIBW_BEFORE_ALL_LINUX: >
            set -eux;

            if command -v dnf; then
                dnf install -y epel-release wget m4 xz git gcc gcc-c++ make gmp-devel mpfr-devel autoconf automake libtool;
            elif command -v yum; then
                yum install -y epel-release wget m4 xz git gcc gcc-c++ make gmp-devel mpfr-devel autoconf automake libtool;
            elif command -v microdnf; then
                microdnf install -y epel-release wget m4 xz git gcc gcc-c++ make gmp-devel mpfr-devel autoconf automake libtool;
            else
                echo "No package manager found";
                exit 1;
            fi

            crb enable || true;

            export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH;
            export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig;

            GMP_VER=$(pkg-config --modversion gmp || echo "0");
            echo "Detected GMP: $GMP_VER";

            if [ "$(printf '%s\n' "6.2.1" "$GMP_VER" | sort -V | head -n1)" != "6.2.1" ]; then
              echo "Installing newer GMP...";
              wget https://ftp.gnu.org/gnu/gmp/gmp-6.2.1.tar.xz;
              tar -xf gmp-6.2.1.tar.xz;
              cd gmp-6.2.1;
              ./configure --prefix=/usr/local --enable-cxx --enable-shared --disable-static;
              make -j$(nproc);
              make install;
              ldconfig;
              cd ..;
            fi
            
            MPFR_VER=$(pkg-config --modversion mpfr || echo "0");
            echo "Detected MPFR: $MPFR_VER";

            if [ "$(printf '%s\n' "4.2.1" "$MPFR_VER" | sort -V | head -n1)" != "4.2.1" ]; then
              echo "Installing newer MPFR...";
              wget https://www.mpfr.org/mpfr-4.2.1/mpfr-4.2.1.tar.xz;
              tar -xf mpfr-4.2.1.tar.xz;
              cd mpfr-4.2.1;
              ./configure --prefix=/usr/local --with-gmp=/usr/local;
              make -j$(nproc);
              make install;
              ldconfig;
              cd ..;
            fi

            git clone https://github.com/flintlib/flint.git;
            cd flint;
            ./bootstrap.sh;
            ./configure --prefix=/usr/local --with-gmp=/usr/local --enable-shared --disable-static;
            make -j$(nproc);
            make install;
            ldconfig;
            cd ..;

          CIBW_BEFORE_ALL_MACOS: brew install flint
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          
          CIBW_SKIP: "cp36-* cp37-* cp38-* cp39-* pp* *-manylinux_i686 *musllinux*"
          CIBW_ENVIRONMENT: CMAKE_SOURCE_DIR="src/sirena/cpp"
          CIBW_BUILD_FRONTEND: "build"

      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  publish:
    name: Upload to TestPyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
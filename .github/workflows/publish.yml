name: Build and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install FLINT (macOS)
        if: runner.os == 'macOS'
        run: brew install flint

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:

          MACOSX_DEPLOYMENT_TARGET: "15.0"

          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y epel-release;
            crb enable || true;
            dnf install -y gmp-devel gcc gcc-c++ make;

            # Build FLINT
            git clone https://github.com/flintlib/flint.git;
            cd flint;
            ./configure -enable-shared --disable-static;
            make -j$(nproc);
            make install;
            ldconfig;

            echo "=== Checking FLINT install ===";
            ls -R /usr/local/lib | grep flint || true;
            
            cd ..;

            # Build ARB
            git clone https://github.com/fredrik-johansson/arb.git;
            cd arb;
            ./configure;
            make -j$(nproc);
            make install;
            ldconfig;
            cd ..;

          CIBW_BEFORE_ALL_MACOS: brew install flint
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          
          CIBW_SKIP: "cp36-* cp37-* cp38-* cp39-* pp*"
          CIBW_ENVIRONMENT: CMAKE_SOURCE_DIR="src/sirena/cpp"
          CIBW_BUILD_FRONTEND: "build"

      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  publish:
    name: Upload to TestPyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true